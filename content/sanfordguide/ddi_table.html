<html><head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <base target="_top">
    <link rel="stylesheet" href="dosing-tables-v3.css">
    <script>
        window.onload = function() {
            try{
                if(window.self !== window.top){
                    document.getElementById("xsTitle").className = "hidden";
                    document.getElementById("normTitle").className = "hidden";
                    document.getElementById("sgLogo").className = "hidden";
                    document.getElementById("search").placeholder = "Search this table"
                }else{
                    document.getElementById("xsTitle").style.visibility = "visible";
                    document.getElementById("normTitle").style.visibility = "visible";
                    document.getElementById("sgLogo").style.visibility = "visible";
                    document.getElementById("search").placeholder = "Search this table"
                }
            } catch (e) { }
        };
    </script>
    <title>Page Title Placeholder</title>
</head>
<body>
<div class="pageHeader">
    <a href="/"> <img id="sgLogo" class="sgLogo" style="visibility: visible;" src="sgchars.png"> </a>

    <button id="editorialNote" type="button" data-view-types="editorial-note-modal" hidden="hidden" style="margin-top: 2px">Editorial Note</button>

    <div id="xsTitle" class="tableTitle visible-xs" style="visibility: visible;">Table Title Placeholder</div>
    <div id="normTitle" class="tableTitle hidden-xs" style="visibility: visible;">Table Title Placeholder</div>

    <div class="search hidden-xs">
        <div class="svgHolder">
            <!-- Source: https://icons.getbootstrap.com/icons/search/ -->
            <svg width="1.1em" height="1.1em" class="bi bi-search" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" d="M10.442 10.442a1 1 0 0 1 1.415 0l3.85 3.85a1 1 0 0 1-1.414 1.415l-3.85-3.85a1 1 0 0 1 0-1.415z"/>
                <path fill-rule="evenodd" d="M6.5 12a5.5 5.5 0 1 0 0-11 5.5 5.5 0 0 0 0 11zM13 6.5a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0z"/>
            </svg>
        </div>
        <input type="text" class="search searchBox hidden-xs" id="search" placeholder="Search Tables">
    </div>
    <button type="button" class="btn btn-default visible-xs searchIcon" data-toggle="modal" data-target="#searchModal" id="searchBtn">
        <!-- Source: https://icons.getbootstrap.com/icons/search/ -->
        <svg width="1.1em" height="1.1em" class="bi bi-search" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" d="M10.442 10.442a1 1 0 0 1 1.415 0l3.85 3.85a1 1 0 0 1-1.414 1.415l-3.85-3.85a1 1 0 0 1 0-1.415z"/>
            <path fill-rule="evenodd" d="M6.5 12a5.5 5.5 0 1 0 0-11 5.5 5.5 0 0 0 0 11zM13 6.5a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0z"/>
        </svg>
    </button>
    <hr class="headerHr">
</div>

<div class="fixedHeaders">
    <table class="mainTableHeaders hidden-xs">
        <colgroup>
            <col style="width: 50%"/>
            <col style="width: 50%"/>
        </colgroup>
        <thead>
        <tr class="tableHeader">
            <td id="colHeader1" class="colHeader" data-view-types="column-modal1"><br/>Placeholder 1</td>
            <td id="colHeader2" class="colHeader last-child" data-view-types="column-modal2"><br/>Placeholder 2</td>
        </tr>
        </thead>
    </table>
    <table class="mainTableHeaders visible-xs">
        <colgroup>
            <col style="width: 50%"/>
            <col style="width: 50%"/>
        </colgroup>
        <tbody>
        <tr class="tableHeader">
            <td id="colHeader1s" class="colHeader" data-view-types="column-modal1s">Placeholder<br/>Text 1</td>
            <td id="colHeader2s" class="colHeader last-child" data-view-types="column-modal2s">Placeholder<br/>Text 2</td>
        </tr>
        </tbody>
    </table>
</div>

<div id="sg-table-container" class="dataTable isir">
    <div class="dataRows">
        <table class="mainTable" id="mainTable">
            <colgroup>
                <col style="width: 50%"/>
                <col style="width: 50%"/>
                <col style="width: 0%"/>
            </colgroup>
            <tbody>
                <!-- Table data will dynamically populate-->
            </tbody>
        </table>
    </div>
</div>

<div class="modal" id="searchModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-body modal-grad">
                <input type="text" class="searchBox searchSm" id="search2" placeholder="Search this table" style="vertical-align: middle;">
                <br>
                <button id="searchBtnModal" type="button" class="btn btn-default" data-dismiss="modal">Search</button>
                <button id="cancelBtnModal" type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="sgModal">
    <div class="modal-dialog" tabindex="-1" role="dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title" id="sgModalHeader">Modal title</h4>
            </div>
            <div class="modal-body" id="sgModalBody">
                <h3>Modal Body</h3>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script src="/sg-one-tools/sg-one-polyfill.js"></script>

<script src="ddi_data_json.js"></script>
<script src="dosing-tables-v3.js"></script>
<script>
    try {
        let mainInstance = new Main({
            offline_data: window.table_data.data,
            links: window.location.protocol !== "file:",
            type: 'ddi'
        });
    } catch (e) {
        throw e;
    }
</script>
</body></html>
